<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Home - Modern Platform</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">


    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100">

<div id="root"></div>

<script type="text/babel" data-type="module" src="shared.js"></script>
<script type="text/babel" data-type="module">
    const { useState, useEffect } = window;
    const Icon = window.Icon;
    const icons = window.icons;
    const Button = window.Button;
    const api = window.api;

    function App() {
        const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('user')) || null);

        // Engineer State
        const [profileForm, setProfileForm] = useState({ name: '', phone: '', specialization: '', price: '' });
        const [myProjects, setMyProjects] = useState([]);
        const [chatRules, setChatRules] = useState([]);
        const [newRule, setNewRule] = useState({ keyword: '', answer: '' });
        const [projForm, setProjForm] = useState({ title: '', description: '' });
        const [projFile, setProjFile] = useState(null);

        // Customer State
        const [engineers, setEngineers] = useState([]);
        const [searchName, setSearchName] = useState('');
        const [searchLocation, setSearchLocation] = useState('');
        const [searchSpec, setSearchSpec] = useState('');
        const [searchPrice, setSearchPrice] = useState('');

        useEffect(() => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const loadData = async () => {
                try {
                    const { db } = await window.loadFirebase();
                    const { doc, getDoc, collection, query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js");

                    if (user.type === 'engineer') {
                        setProfileForm({
                            name: user.name,
                            phone: user.phone,
                            specialization: user.specialization || '',
                            price: user.price || ''
                        });
                        const userDoc = await getDoc(doc(db, 'users', user.id));
                        if (userDoc.exists()) {
                            setMyProjects(userDoc.data().projects || []);
                        }
                        setChatRules(JSON.parse(localStorage.getItem('rules_' + user.id) || '[]'));
                    } else {
                        const q = query(collection(db, 'users'), where('type', '==', 'engineer'));
                        const querySnapshot = await getDocs(q);
                        const engs = [];
                        querySnapshot.forEach((doc) => {
                            engs.push({ id: doc.id, ...doc.data() });
                        });
                        setEngineers(engs);
                    }
                } catch (error) {
                    console.error("Error loading data:", error);
                }
            };
            loadData();
        }, [user]);

        if (!user) return <div className="h-screen flex items-center justify-center font-bold text-blue-600">Redirecting...</div>;

        const handleLogout = () => {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };

        const updateProfile = async () => {
            try {
                const { db } = await window.loadFirebase();
                const { doc, updateDoc } = await import("https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js");

                await updateDoc(doc(db, 'users', user.id), profileForm);

                const updatedUser = { ...user, ...profileForm };
                setUser(updatedUser);
                localStorage.setItem('user', JSON.stringify(updatedUser));
                alert("Profile Updated!");
            } catch (error) {
                console.error(error);
                alert("Error updating: " + error.message);
            }
        };

        const addRule = () => {
            const rules = [...chatRules, { ...newRule, id: Date.now() }];
            setChatRules(rules);
            localStorage.setItem('rules_' + user.id, JSON.stringify(rules));
            setNewRule({ keyword: '', answer: '' });
        };

        const addProject = async () => {
            if (!projFile) { alert("Please select an image file."); return; }
            try {
                const { db, storage } = await window.loadFirebase();
                const { ref, uploadBytes, getDownloadURL } = await import("https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js");
                const { doc, updateDoc, arrayUnion } = await import("https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js");

                // Upload image
                const storageRef = ref(storage, `projects/${user.id}_${Date.now()}_${projFile.name}`);
                await uploadBytes(storageRef, projFile);
                const imageUrl = await getDownloadURL(storageRef);

                const newProject = {
                    title: projForm.title,
                    description: projForm.description,
                    image_url: imageUrl
                };

                // Update Firestore
                await updateDoc(doc(db, 'users', user.id), {
                    projects: arrayUnion(newProject)
                });

                alert("Successfully Uploaded");

                setMyProjects(prev => [...prev, newProject]);
                setProjForm({ title: '', description: '' });
                setProjFile(null);
            } catch (error) {
                console.error(error);
                alert("Error uploading project: " + error.message);
            }
        };

        if (user.type === 'engineer') {
            return (
                <div className="min-h-screen bg-slate-900">
                    <nav className="glass-nav sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm text-slate-100 border-none">
                        <div className="text-xl font-bold flex items-center gap-2 text-blue-400 cursor-pointer" onClick={() => window.location.href='index.html'}><Icon path={icons.briefcase}/> EngineerHub</div>
                        <div className="flex items-center gap-4">
                            <span className="text-slate-300 font-medium hidden md:block">Hello, {user.name}</span>
                            <Button variant="danger" onClick={handleLogout} className="!py-2 !px-4 !text-sm"><Icon path={icons.logout}/> Logout</Button>
                        </div>
                    </nav>
                    <div className="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 animate-fade-in-up">
                        <div className="lg:col-span-4 space-y-6">
                            <div className="card-3d p-6 h-fit text-slate-100 rounded-2xl">
                                <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><Icon path={icons.edit}/> Edit Profile</h2>
                                <div className="space-y-3">
                                    <input placeholder="Name" className="w-full p-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-400 outline-none focus:ring-2 ring-blue-500" value={profileForm.name} onChange={e => setProfileForm({...profileForm, name:e.target.value})} />
                                    <input placeholder="Phone" className="w-full p-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-400 outline-none focus:ring-2 ring-blue-500" value={profileForm.phone} onChange={e => setProfileForm({...profileForm, phone:e.target.value})} />
                                    <input placeholder="Specialization (e.g. Architect)" className="w-full p-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-400 outline-none focus:ring-2 ring-blue-500" value={profileForm.specialization} onChange={e => setProfileForm({...profileForm, specialization:e.target.value})} />
                                    <input placeholder="Price (LKR) - Numbers only" className="w-full p-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-400 outline-none focus:ring-2 ring-blue-500" value={profileForm.price} onChange={e => setProfileForm({...profileForm, price:e.target.value})} type="number" />
                                    <Button onClick={updateProfile} className="w-full">Update Profile</Button>
                                </div>
                            </div>
                            <div className="card-3d p-6 h-fit text-slate-100 rounded-2xl">
                                <h2 className="text-lg font-bold mb-4">Chatbot Rules</h2>
                                <div className="space-y-3 mb-4">
                                    <input placeholder="Keyword" className="w-full p-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-400 outline-none focus:ring-2 ring-blue-500" value={newRule.keyword} onChange={e => setNewRule({...newRule, keyword:e.target.value})} />
                                    <input placeholder="Reply" className="w-full p-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-400 outline-none focus:ring-2 ring-blue-500" value={newRule.answer} onChange={e => setNewRule({...newRule, answer:e.target.value})} />
                                    <Button onClick={addRule} className="w-full">Add Rule</Button>
                                </div>
                                <div className="max-h-60 overflow-y-auto space-y-2">
                                    {chatRules.map((r, i) => (
                                        <div key={i} className="bg-slate-800/50 p-2 rounded flex justify-between text-sm">
                                            <span><b>{r.keyword}</b>: {r.answer}</span>
                                            <button onClick={() => { const n = chatRules.filter((_, idx) => idx !== i); setChatRules(n); localStorage.setItem('rules_'+user.id, JSON.stringify(n)); }} className="text-red-500">x</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="lg:col-span-8 card-3d p-6 text-slate-100 rounded-2xl">
                            <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon path={icons.upload}/> Add Project</h2>
                            <div className="space-y-4 mb-6">
                                <input placeholder="Project Title" className="w-full p-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-400 outline-none focus:ring-2 ring-blue-500" value={projForm.title} onChange={e => setProjForm({...projForm, title:e.target.value})} />
                                <textarea placeholder="Description" rows="2" className="w-full p-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-400 outline-none focus:ring-2 ring-blue-500" value={projForm.description} onChange={e => setProjForm({...projForm, description:e.target.value})} />
                                <div className="border-2 border-dashed border-slate-500 rounded-lg p-6 text-center hover:bg-slate-800/50 transition cursor-pointer relative">
                                    <input type="file" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={e => setProjFile(e.target.files[0])} />
                                    <div className="text-slate-400">
                                        <p className="font-bold">{projFile ? projFile.name : "Click to Upload Image"}</p>
                                        <p className="text-sm">JPG, PNG, GIF (Max 5MB)</p>
                                    </div>
                                </div>
                                <Button onClick={addProject}>Publish Project</Button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {myProjects.map((p, i) => (
                                    <div key={i} className="card-3d rounded-xl overflow-hidden border-none shadow-lg">
                                        <img src={p.image_url} className="w-full h-32 object-cover"/>
                                        <div className="p-4 bg-slate-800/50 backdrop-blur-sm"><h3 className="font-bold text-slate-100">{p.title}</h3></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const filteredEngineers = engineers.filter(eng => {
            const matchName = eng.name.toLowerCase().includes(searchName.toLowerCase());
            const matchLoc = searchLocation ? (eng.address && eng.address.toLowerCase().includes(searchLocation.toLowerCase())) : true;
            const matchSpec = searchSpec ? (eng.specialization && eng.specialization.toLowerCase().includes(searchSpec.toLowerCase())) : true;
            const engPrice = parseFloat(eng.price) || 0;
            const filterPrice = parseFloat(searchPrice);
            const matchPrice = searchPrice ? (engPrice > 0 && engPrice <= filterPrice) : true;
            return matchName && matchLoc && matchSpec && matchPrice;
        });

        return (
            <div className="min-h-screen bg-slate-900">
                <nav className="glass-nav sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm text-slate-100 border-none">
                    <div className="text-xl font-bold cursor-pointer" onClick={() => window.location.href='index.html'}>Find<span className="text-blue-400">Pro</span></div>
                    <div className="flex items-center gap-4">
                         <span className="text-slate-300 font-medium hidden md:block">Hello, {user.name}</span>
                        <Button variant="danger" onClick={handleLogout} className="!py-2 !px-4 !text-sm"><Icon path={icons.logout}/> Logout</Button>
                    </div>
                </nav>
                <div className="container mx-auto p-6 animate-fade-in-up">
                    <div className="card-3d p-6 rounded-3xl mb-8 border border-slate-700/50">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div className="relative"><div className="absolute left-3 top-3 text-gray-400"><Icon path={icons.search}/></div><input placeholder="Search Name..." className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-800/50 border-0 focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-400 outline-none" value={searchName} onChange={e => setSearchName(e.target.value)}/></div>
                            <div className="relative"><div className="absolute left-3 top-3 text-gray-400"><Icon path={icons.home}/></div><input placeholder="Location..." className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-800/50 border-0 focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-400 outline-none" value={searchLocation} onChange={e => setSearchLocation(e.target.value)}/></div>
                            <div className="relative"><div className="absolute left-3 top-3 text-gray-400"><Icon path={icons.briefcase}/></div><select className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-800/50 border-0 focus:ring-2 focus:ring-blue-500 appearance-none text-white outline-none" value={searchSpec} onChange={e => setSearchSpec(e.target.value)}><option value="">All Professionals</option><option value="Civil">Civil</option><option value="Architect">Architect</option><option value="Electrical">Electrical</option></select></div>
                            <div className="relative"><div className="absolute left-3 top-3 text-gray-400">$</div><input type="number" placeholder="Max Price" className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-800/50 border-0 focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-400 outline-none" value={searchPrice} onChange={e => setSearchPrice(e.target.value)}/></div>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" style={{perspective: '1000px'}}>
                        {filteredEngineers.map(eng => (
                            <div key={eng.id} className="card-3d p-6 rounded-2xl text-center">
                                <div className="w-16 h-16 bg-blue-500/20 rounded-full mx-auto flex items-center justify-center text-blue-400 mb-4 shadow-[0_0_15px_rgba(59,130,246,0.5)]"><Icon path={icons.user}/></div>
                                <h3 className="text-lg font-bold text-slate-100">{eng.name}</h3>
                                <p className="text-blue-400 text-sm mb-4 font-bold">{eng.specialization}</p>
                                <p className="text-slate-300 text-xs mb-4 flex justify-center gap-1"><Icon path={icons.home}/> {eng.address} | Price: {eng.price ? `Rs.${eng.price}` : 'N/A'}</p>
                                <Button onClick={() => {
                                    window.location.href = `profile.html?engineerId=${eng.id}`;
                                }} variant="secondary" className="w-full">View Profile</Button>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
