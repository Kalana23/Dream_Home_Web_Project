<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Home - Modern Platform</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    

    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100">

<div id="root"></div>

<script type="text/babel" data-type="module" src="shared.js"></script>
<script type="text/babel" data-type="module">
    const { useState, useEffect } = window;
    const Icon = window.Icon;
    const icons = window.icons;
    const Button = window.Button;
    const api = window.api;
    const VIDEO_URL = window.VIDEO_URL;
    const ChatbotWidget = window.ChatbotWidget;

    function App() {
        const [homeProjects, setHomeProjects] = useState([]);
        const [filteredProjects, setFilteredProjects] = useState([]);
        const [searchLocation, setSearchLocation] = useState('');
        const [searchPropertyType, setSearchPropertyType] = useState('');
        const [searchMaxPrice, setSearchMaxPrice] = useState('');
        const [isAnimating, setIsAnimating] = useState(true);
        const [showChat, setShowChat] = useState(false);

        const globalChatRules = [
            { keyword: 'price', answer: 'The price ranges vary depending on the engineer and the scope of the project. Generally, they range from $3000 to $5000+.' },
            { keyword: 'cost', answer: 'The cost depends on the specific requirements. Please check our engineer profiles for standard pricing or contact them directly.' },
            { keyword: 'location', answer: 'Our engineers are available in various locations including Colombo, Kandy, and Galle. Please refer to the search filter for a full list.' },
            { keyword: 'area', answer: 'We cover major areas such as Colombo, Kandy, and Galle.' }
        ];

        useEffect(() => {
            const loadHomeData = async () => {
                try {
                    const { db } = await window.loadFirebase();
                    const { collection, getDocs, query } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");

                    const projectsQ = query(collection(db, 'projects'));
                    const projectsSnapshot = await getDocs(projectsQ);
                    const allProjs = [];
                    projectsSnapshot.forEach((doc) => {
                        allProjs.push({ id: doc.id, ...doc.data() });
                    });
                    setHomeProjects(allProjs);
                    setFilteredProjects(allProjs);
                } catch (error) {
                    console.error("Error loading home data:", error);
                }
            };
            loadHomeData();
        }, []);

        const handleSearch = () => {
            setIsAnimating(false);
            const filtered = homeProjects.filter(proj => {
                const matchLoc = !searchLocation || (proj.location && proj.location.toLowerCase().includes(searchLocation.toLowerCase()));
                const matchSpec = !searchPropertyType || (proj.propertyType && proj.propertyType.toLowerCase() === searchPropertyType.toLowerCase());
                const projPrice = parseFloat(proj.price) || 0;
                const filterPrice = parseFloat(searchMaxPrice);
                const matchPrice = searchMaxPrice ? (projPrice > 0 && projPrice <= filterPrice) : true;
                return matchLoc && matchSpec && matchPrice;
            });
            setTimeout(() => {
                setFilteredProjects(filtered);
                setIsAnimating(true);
            }, 50); // slight delay to re-trigger CSS animation
        };

        const scrollToSection = (id) => {
            const element = document.getElementById(id);
            if (element) element.scrollIntoView({ behavior: 'smooth' });
        };

        const propertyTypes = ["All", ...new Set(homeProjects.map(p => p.propertyType).filter(Boolean))];

        return (
            <div className="relative min-h-screen">
                <nav className="fixed top-0 w-full z-50 glass-nav px-8 py-4 flex justify-between items-center text-white">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => window.location.reload()}>
                        <div className="bg-blue-600 p-1.5 rounded-lg"><Icon path={icons.home}/></div>
                        <span className="text-xl font-bold tracking-tight">Dream Home</span>
                    </div>
                    <div className="hidden md:flex gap-8 text-sm font-medium text-gray-200">
                        <button onClick={() => window.location.reload()} className="hover:text-white transition">Home</button>
                        <button onClick={() => scrollToSection('services')} className="hover:text-white transition">Services</button>
                        <button onClick={() => scrollToSection('projects')} className="hover:text-white transition">Projects</button>
                        <button onClick={() => scrollToSection('contact')} className="hover:text-white transition">Contact</button>
                    </div>
                    <div className="flex gap-3">
                        <Button onClick={() => window.location.href = 'login.html'} variant="transparent" className="!py-2 !px-4">Login</Button>
                        <Button onClick={() => window.location.href = 'login.html?view=signup'} variant="primary" className="!py-2 !px-4">Sign Up</Button>
                    </div>
                </nav>

                <div id="home" className="relative h-screen flex items-center justify-center overflow-hidden">
                    <video autoPlay loop muted playsInline className="video-bg">
                        <source src={VIDEO_URL} type="video/mp4" />
                    </video>
                    <div className="absolute inset-0 bg-black/50"></div>

                    <div className="relative z-10 text-center max-w-4xl px-4 animate-fade-in-up">
                        <h1 className="text-5xl md:text-7xl font-bold text-white mb-6">Build Your<br/><span className="text-blue-400">Dream Home</span></h1>
                        <p className="text-lg text-gray-200 mb-8">Connect with top-tier engineers and architects to turn your vision into reality.</p>
                        <Button onClick={() => scrollToSection('projects')} variant="primary" className="text-lg px-8 py-3">View Projects</Button>
                    </div>
                </div>

                <div id="services" className="section-padding relative z-10">
                    <div className="container mx-auto max-w-6xl">
                        <h2 className="text-4xl font-bold text-center mb-12 text-slate-100">Our <span className="text-blue-400">Services</span></h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8" style={{perspective: '1000px'}}>
                            <div className="card-3d p-8 rounded-2xl flex flex-col items-center"><div className="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center text-blue-400 mb-6 mx-auto shadow-[0_0_15px_rgba(59,130,246,0.5)]"><Icon path={icons.briefcase}/></div><h3 className="text-xl font-bold text-center mb-4 text-slate-100">Construction Planning</h3><p className="text-slate-300 text-center">Expert consultation and planning.</p></div>
                            <div className="card-3d p-8 rounded-2xl flex flex-col items-center"><div className="w-16 h-16 bg-purple-500/20 rounded-full flex items-center justify-center text-purple-400 mb-6 mx-auto shadow-[0_0_15px_rgba(168,85,247,0.5)]"><Icon path={icons.tool}/></div><h3 className="text-xl font-bold text-center mb-4 text-slate-100">Architecture Design</h3><p className="text-slate-300 text-center">Modern and sustainable designs.</p></div>
                            <div className="card-3d p-8 rounded-2xl flex flex-col items-center"><div className="w-16 h-16 bg-green-500/20 rounded-full flex items-center justify-center text-green-400 mb-6 mx-auto shadow-[0_0_15px_rgba(34,197,94,0.5)]"><Icon path={icons.pen}/></div><h3 className="text-xl font-bold text-center mb-4 text-slate-100">Interior Renovation</h3><p className="text-slate-300 text-center">Transform your existing space.</p></div>
                        </div>
                    </div>
                </div>
                <div className="container mx-auto max-w-6xl mt-16 relative z-10 px-4">
                    <div className="card-3d p-6 rounded-3xl mb-8 glass border border-slate-700/50">
                        <h3 className="text-xl font-bold mb-4 text-slate-100 flex items-center gap-2"><Icon path={icons.search}/> Advanced Search & Filter</h3>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div className="relative">
                                <div className="absolute left-3 top-3 text-gray-400"><Icon path={icons.home}/></div>
                                <input placeholder="Location..." className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-800/50 border-0 focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-400 outline-none" value={searchLocation} onChange={e => setSearchLocation(e.target.value)}/>
                            </div>
                            <div className="relative">
                                <div className="absolute left-3 top-3 text-gray-400"><Icon path={icons.briefcase}/></div>
                                <select className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-800/50 border-0 focus:ring-2 focus:ring-blue-500 appearance-none text-white outline-none" value={searchPropertyType} onChange={e => setSearchPropertyType(e.target.value)}>
                                    {propertyTypes.map((pt, idx) => <option key={idx} value={pt === "All" ? "" : pt}>{pt}</option>)}
                                </select>
                            </div>
                            <div className="relative">
                                <div className="absolute left-3 top-3 text-gray-400">$</div>
                                <input type="number" placeholder="Max Price" className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-800/50 border-0 focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-400 outline-none" value={searchMaxPrice} onChange={e => setSearchMaxPrice(e.target.value)}/>
                            </div>
                            <Button onClick={handleSearch} className="w-full h-full">Search</Button>
                        </div>
                    </div>
                </div>

                <div id="projects" className="section-padding relative z-10">
                    <div className="container mx-auto max-w-6xl">
                        <h2 className="text-4xl font-bold text-center mb-12 text-slate-100">Featured <span className="text-blue-400">Projects</span></h2>
                        {filteredProjects.length > 0 ? (
                            <div className={`grid grid-cols-1 md:grid-cols-3 gap-6 ${isAnimating ? 'animate-fade-in-up' : 'opacity-0'}`} style={{perspective: '1000px'}}>
                                {filteredProjects.map((proj, index) => (
                                    <div key={index} onClick={() => { alert("You need to create an account to view details."); window.location.href = 'login.html?view=signup'; }} className="card-3d group relative rounded-2xl overflow-hidden cursor-pointer h-64">
                                        <img src={proj.image_url} className="w-full h-full object-cover transition duration-500 group-hover:scale-110"/>
                                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center"><div className="text-center p-4"><h3 className="text-white font-bold text-xl">{proj.title}</h3><p className="text-blue-300 text-sm mt-2">Click to view details</p></div></div>
                                    </div>
                                ))}
                            </div>
                        ) : homeProjects.length === 0 ? (
                            <div className="col-span-full text-center py-12">
                                <p className="text-gray-400 mb-4">No projects published yet.</p>
                                <a href="login.html" className="inline-block px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition transform hover:-translate-y-1">
                                    Join Now to Publish
                                </a>
                            </div>
                        ) : (<div className="text-center py-12 glass rounded-2xl"><p className="text-slate-300 text-lg">No matching projects found.</p><Button onClick={() => { setSearchLocation(''); setSearchPropertyType(''); setSearchMaxPrice(''); setFilteredProjects(homeProjects); }} className="mt-4 mx-auto">Clear Filters</Button></div>)}
                    </div>
                </div>
                <div id="contact" className="bg-slate-900 text-white py-16 relative z-10">
                    <div className="container mx-auto px-6 text-center">
                        <h2 className="text-3xl font-bold mb-8">Contact Us</h2>
                        <div className="flex flex-col md:flex-row justify-center gap-12 mb-12">
                            <div className="flex flex-col items-center"><div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center mb-4"><Icon path={icons.phone}/></div><h3 className="font-bold text-lg">Call Us</h3><p className="text-gray-400 mt-2">+94 77 123 4567</p></div>
                            <div className="flex flex-col items-center"><div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center mb-4"><Icon path={icons.msg}/></div><h3 className="font-bold text-lg">Email Us</h3><p className="text-gray-400 mt-2">admin@dreamhome.lk</p></div>
                        </div>
                    </div>
                </div>

                <button
                    onClick={() => setShowChat(true)}
                    className="fixed bottom-6 right-6 w-16 h-16 rounded-full bg-blue-600/80 backdrop-blur-md border border-blue-400/30 text-white flex items-center justify-center btn-3d shadow-2xl z-50 animate-fade-in-up"
                >
                    <Icon path={icons.chat}/>
                </button>

                {showChat && <ChatbotWidget engineerName="Dream Home Platform" rules={globalChatRules} onClose={() => setShowChat(false)} />}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
